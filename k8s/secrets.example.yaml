# Copy to secrets.yaml and `kubectl apply -n jobtracker -f k8s/secrets.yaml`.
# Never commit the real values.
apiVersion: v1
kind: Secret
metadata:
  name: jobtracker-secrets
  namespace: jobtracker
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme"
  APP_SECRET_KEY: "replace-with-long-random-string"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
