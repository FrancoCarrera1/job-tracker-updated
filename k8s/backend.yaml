apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jobtracker-storage
  namespace: jobtracker
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jobtracker
spec:
  replicas: 1
  selector: { matchLabels: { app: backend } }
  template:
    metadata:
      labels: { app: backend }
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/your-user/jobtracker-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: jobtracker-config }
            - secretRef:    { name: jobtracker-secrets }
      containers:
        - name: backend
          image: ghcr.io/your-user/jobtracker-backend:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef: { name: jobtracker-config }
            - secretRef:    { name: jobtracker-secrets }
          ports:
            - containerPort: 8000
          volumeMounts:
            - { name: storage, mountPath: /app/storage }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: jobtracker-storage
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: jobtracker
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
